# ABLATION: crossover-only mutation.
#   crossover_ratio: 1.0, in_depth_ratio: 0.0  -> every mutation is a crossover
#   (in_breadth = 1 - 1.0 - 0.0 = 0). _sample_operator() always returns
#   "crossover"; inner_iteration_batch falls back to in_depth only when the
#   archive has < 2 champions (early bootstrap), which is unavoidable.
# verl override (RL settings) is embedded inline below under `verl_config:`;
# experiment_name/dir are set by the run script via RQ_EXP_NAME / RQ_LOCAL_DIR.

archive:
  n_h_bins: 10
  n_div_bins: 6
  h_range: [0.1, 0.6]
  diversity_axis: concept_group
  epsilon: 0.3
  ucb_c: 1.0
  selection_strategy: random

evolution:
  seed_programs_dir: seed_programs
  inner_iterations: 32
  inner_iteration_batch_size: 32
  num_rollouts: 10
  # --- ablation knobs ---
  # in_breadth is NOT a knob: it is the remainder = 1 - crossover_ratio - in_depth_ratio.
  # crossover_ratio MUST be set explicitly to 0.0 to disable crossover; commenting it
  # out falls back to the config.py default (0.2), which silently re-enables it.
  crossover_ratio: 0.0       # crossover OFF
  in_depth_ratio: 0.5        # -> in_breadth = 1 - 0.0 - 0.5 = 0.5  (50/50 depth/breadth)
  # -----------------------
  verify_seeds: 5
  frontier_p_hat_range: [0.0, 1.0]
  fix_retry: false
  use_evaluator: true        # LLM coherence gate on seed-0 problem before archive
  # Evolver REINFORCE: update the shared actor as the Questioner after each
  # Solver GRPO update, on the mutations that entered the MAP this iteration
  # (reward = normalized R_Q). Off by default; flip to true to enable.
  evolver_update: false
  evolver_max_samples: null  # null = all; keep <= ppo_mini_batch_size (32) for exact REINFORCE
  # inserted_only (sparse) | valid_all (inserted + rejected_non_elite + p_hat_zero
  # = every solver-scored valid problem) -> denser reward pool, no -1 penalty.
  evolver_reward_mode: valid_all

training_data:
  instances_per_program: 8
  training_budget: null
  strict_anti_reuse: true

verl:
  enabled: true
  # config_path is optional: if `verl_config` (below) is present it takes
  # precedence and the standalone yaml is unnecessary.
  config_path: null
  reward_function: ./src/rq_evolve/reward.py:compute_score
  evolve_on_first_epoch: false

math_eval:
  enabled: true
  benchmarks: [math500, amc23, aime24, aime25, minerva_math, olympiadbench]
  max_samples_per_benchmark: -1
  sample_seed: 42
  # OFF for periodic in-trainer eval: R-Zero's x32 AMC/AIME inflation makes the
  # set ~4.6k prompts, and grading them serially through math_verify (sympy) on
  # the base model's pathological boxed outputs clogs the async reward workers
  # -> GPU sits at 0% mid-eval. Without inflation the set is ~1.5k. Offline final
  # eval still uses full x32 (load_math_benchmark defaults inflate=True).
  inflate_x32: false
  grader: sympy

# ----------------------------------------------------------------------------
# verl override (was configs/verl_grpo_h_g8_fix.yaml). All edits to RL/rollout
# settings live here.
# ----------------------------------------------------------------------------
verl_config:
  data:
    max_prompt_length: 6000
    max_response_length: 6000
    train_batch_size: 36
    val_batch_size: 60000
    shuffle: true
    truncation: left
    dataloader_num_workers: 0
    filter_overlong_prompts: false
    trust_remote_code: true

  actor_rollout_ref:
    model:
      # EasyR1 worker.actor.model.model_path: Qwen/Qwen3-8B-Base
      path: /data1/yhoon113/qwen3-8b-base
      trust_remote_code: true
      # Without remove_padding the model forwards padding tokens — with
      # max_seq_len=12000 and vocab=151k the bf16 logits tensor is ~22GB per
      # micro-batch of 6, OOMing on 97GB GPUs once vLLM + actor + ref coexist.
      use_remove_padding: true
      enable_gradient_checkpointing: true

    actor:
      strategy: fsdp
      ppo_mini_batch_size: 32
      ppo_micro_batch_size: null
      ppo_micro_batch_size_per_gpu: 4
      use_dynamic_bsz: false
      # EasyR1 algorithm.use_kl_loss + kl_penalty + kl_coef
      use_kl_loss: true
      kl_loss_coef: 1.0e-3
      kl_loss_type: low_var_kl
      use_torch_compile: false
      fsdp_config:
        param_offload: false
        optimizer_offload: false
      optim:
        lr: 1.0e-6
        weight_decay: 1.0e-2
        lr_warmup_steps_ratio: 0.0
        # EasyR1 trainer.max_steps: 256 (LR schedule horizon)
        total_training_steps: 256

    ref:
      log_prob_micro_batch_size: null
      # 1 (was 4): the log-prob/entropy forward materializes a full-vocab
      # (151k) logits tensor per micro-batch (~13.7 GB at 4). With vLLM now
      # resident (sleep disabled) this OOMs during the evolve phase, which runs
      # at the epoch boundary right after update_actor (optimizer states still
      # on GPU). micro-batch 1 cuts the transient ~4x; the forward is a small
      # fraction of step time so the throughput cost is negligible.
      log_prob_micro_batch_size_per_gpu: 2
      fsdp_config:
        # Offload ref weights to CPU when not used; ref is forward-only and
        # only needed for the per-step KL term.
        param_offload: true

    rollout:
      name: vllm
      # verl 0.7.x: rollout.mode='sync' was removed; only 'async' is accepted.
      # AsyncActorRolloutRefWorker only overrides update_weights with
      # blocking=False; generate_sequences/compute_log_prob fall through to
      # the parent ActorRolloutRefWorker. Our backend routes generation
      # through trainer.async_rollout_manager (AgentLoopManager) — never via
      # actor_rollout_wg.generate_sequences — so the old "event loop already
      # running" failure mode doesn't apply.
      mode: async
      # EasyR1 worker.rollout.temperature / top_p
      temperature: 1.0
      top_p: 0.95
      # EasyR1 worker.rollout.n: 8  (GRPO group size, the "g8")
      n: 8
      # EasyR1 worker.rollout.tensor_parallel_size: 1
      tensor_model_parallel_size: 1
      # Bucketed weight transfer to vLLM groups tensors into a fixed-size buffer;
      # the largest single tensor must fit in one bucket. Qwen3-8B's
      # embed_tokens.weight is 151936 x 4096 x 4B (fp32 master weight) ~= 2374 MB,
      # which overflows the verl default of 2048 MB. Raise to 4096 MB for headroom.
      # NOTE: the runtime reads this from rollout.checkpoint_engine.* (vllm_rollout.py
      # line 166: self.config.checkpoint_engine.update_weights_bucket_megabytes);
      # the assertion's "rollout.update_weights_bucket_megabytes" message omits the
      # checkpoint_engine level.
      checkpoint_engine:
        update_weights_bucket_megabytes: 4096
      # vLLM is now RESIDENT (sleep mode disabled, see below) and must coexist
      # on-GPU with the FSDP actor's training step (peak ~33 GB reserved). On
      # 97 GB cards. vLLM is resident; the actor's evolve-phase log-prob/entropy
      # forward plus resident optimizer states must coexist, so keep vLLM modest:
      # 0.45*97~=43 GB vLLM + ~42 GB actor (incl. optimizer) ~= 85 GB, with the
      # entropy transient shrunk via log_prob_micro_batch_size_per_gpu=1 below.
      gpu_memory_utilization: 0.5
      max_model_len: 12000
      max_num_batched_tokens: 12288
      dtype: bfloat16
      enable_chunked_prefill: true
      enforce_eager: false
      # --- vLLM sleep/wake DISABLED ---------------------------------------
      # This (custom) vLLM 0.19.1 build's cumem allocator fails to re-map GPU
      # virtual memory on wake_up after ~3 sleep/wake cycles:
      #   "CUDA Error: invalid argument at cumem_allocator.cpp:145".
      # It reproduces in verl's own per-step wake (one wake/step) regardless of
      # R-Q-Evolve, so any run dies by ~step 3. free_cache_engine=false makes
      # verl skip rollout.resume()/sleep() (the wake_up call site,
      # fsdp_workers.rollout_mode), and enable_sleep_mode=false builds vLLM
      # without the cumem allocator at all (verl then auto-enables
      # expandable_segments). vLLM stays resident; weights are still synced from
      # FSDP via checkpoint_manager.update_weights each step (naive backend =
      # plain weight push, no wake/sleep). Costs the GPU memory above.
      free_cache_engine: false
      enable_sleep_mode: false
      log_prob_micro_batch_size: null
      # actor's compute_log_prob (our evolve uncertainty/entropy path) reads
      # THIS rollout knob (fsdp_workers: config_source = self.config.rollout).
      # 1 (was 4) to shrink the full-vocab entropy logits transient -> avoids
      # the evolve-phase OOM. See the ref section note above.
      log_prob_micro_batch_size_per_gpu: 2

  critic:
    # GRPO (adv_estimator=grpo) does not train a critic; verl skips the critic
    # worker. These are placeholders only so the config validates.
    ppo_mini_batch_size: 32
    ppo_micro_batch_size: null
    ppo_micro_batch_size_per_gpu: 4

  reward_model:
    enable: false
    reward_manager: naive

  reward:
    # verl_adapter._patch_reward_config() overrides path/name from
    # rq_evolve config (verl.reward_function), so this is just the default.
    custom_reward_function:
      path: ./src/rq_evolve/reward.py
      name: compute_score
    reward_manager:
      source: register
      name: naive
    reward_model:
      enable: false

  algorithm:
    adv_estimator: grpo
    # EasyR1 used actor-side KL loss (use_kl_loss above), not reward-side KL.
    use_kl_in_reward: false
    kl_penalty: low_var_kl
    norm_adv_by_std_in_grpo: true

  trainer:
    # EasyR1 trainer.total_outer_iterations: 100
    # Each verl epoch == one RQ outer iteration (EvolvingSampler evolves at the
    # start of every epoch).
    total_epochs: 10000
    # EasyR1 trainer.max_steps: 256 (hard cap on optimizer steps)
    total_training_steps: 256
    project_name: rq_evolve
    # Overridable per ablation via RQ_EXP_NAME (default = base run name).
    experiment_name: qwen3_8b_base_rq_evolve_base
    logger:
      - console
      - wandb
    nnodes: 1
    n_gpus_per_node: 8
    # Skip the pre-step-0 validation pass — the full benchmark set is ~1.5k
    # prompts and takes ~10-15 minutes; periodic eval at test_freq still runs.
    val_before_train: false
    # ~50 gives a few evals within total_training_steps=256. NOTE: the full
    # benchmark set (AMC/AIME are ×32-inflated) is thousands of prompts per
    # eval; lower test_freq or math_eval.max_samples_per_benchmark for cheap.
    test_freq: 32
    save_freq: 32
    # Overridable per ablation via RQ_LOCAL_DIR (also separates the rq_archive/
    # checkpoint dir so ablations never share an archive).
    default_local_dir: ./rq_output/rq_evolve_base
    device: cuda
    # Resume: weights resume from the latest global_step_* via verl's `auto`
    # (reads latest_checkpointed_iteration.txt). The RQ MAP-Elites archive lives
    # outside the verl checkpoint but is ALWAYS restored independently at startup
    # via evolver.load_state(archive_dir) from rq_archive/archive.json (+
    # rq_used_seeds.json), so weights and archive resume consistently. Set to
    # `disable` for a fresh run from the base model.
    resume_mode: auto

  ray_init:
    num_cpus: null
