# ABLATION: random parent selection.
# Identical to rq_evolve_grpo_h_g8_fix.yaml except archive.selection_strategy,
# matching evo-sample's rq_config_grpo_h_g8_fix_random.yaml. sample_parent()
# (and sample_two_parents) then pick niches uniformly at random, ignoring R_Q
# rank and UCB exploration counts (original MAP-Elites selection).
# Shares the verl override; experiment_name/dir set by the run script.

archive:
  n_h_bins: 10
  n_div_bins: 6
  h_range: [0.0, 0.5]
  diversity_axis: concept_group
  epsilon: 0.3
  ucb_c: 1.0
  # --- ablation knob ---
  selection_strategy: random   # ablation: uniform random parent (vs ucb)
  # ---------------------

evolution:
  seed_programs_dir: seed_programs
  inner_iterations: 64
  inner_iteration_batch_size: 8
  num_rollouts: 10
  in_depth_ratio: 0.5
  crossover_ratio: 0.2
  verify_seeds: 5
  frontier_p_hat_range: [0.1, 0.9]

training_data:
  instances_per_program: 8
  training_budget: null
  strict_anti_reuse: true

verl:
  enabled: true
  config_path: configs/verl_grpo_h_g8_fix.yaml
  reward_function: ./src/rq_evolve/reward.py:compute_score
  evolve_on_first_epoch: false

math_eval:
  enabled: true
  benchmarks: [math500, amc23, aime24, aime25, minerva_math, olympiadbench]
  max_samples_per_benchmark: -1
  sample_seed: 42
  grader: sympy
